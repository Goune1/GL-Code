appId: com.gael.gl-code
productName: GL Code
copyright: Copyright © 2026 Gaël LE DREO

directories:
  output: dist
  buildResources: resources

files:
  - out/**/*
  - resources/**/*
  - package.json

# Native addons (better-sqlite3, ssh2) ne peuvent pas être dans l'asar
asarUnpack:
  - "**/*.node"
  - "**/node_modules/better-sqlite3/**"
  - "**/node_modules/ssh2/**"

win:
  target:
    - target: portable
      arch: x64
  icon: resources/icon.png
  artifactName: GL-Code-Setup.exe
