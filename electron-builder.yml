appId: com.gael.gl-code
productName: GL Code
copyright: Copyright © 2026 Gaël LE DREO

directories:
  output: C:\Users\goune\Downloads\GL-Code-build
  buildResources: resources

files:
  - out/**/*
  - resources/**/*
  - package.json

# Native addons and executables that cannot be run from inside an asar archive.
# claude.exe (Claude Code binary) and .node bindings must live in app.asar.unpacked
# so the OS can spawn/dlopen them directly.
asarUnpack:
  - "**/*.node"
  - "**/node_modules/better-sqlite3/**"
  - "**/node_modules/ssh2/**"
  - "**/node_modules/@anthropic-ai/claude-agent-sdk/**"
  - "**/node_modules/@anthropic-ai/claude-agent-sdk-win32-x64/**"

win:
  target:
    - target: nsis
      arch: x64
  icon: resources/icon.png
  artifactName: GL-Code-Setup.exe
